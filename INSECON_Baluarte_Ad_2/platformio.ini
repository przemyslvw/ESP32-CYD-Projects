[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

board_build.flash_mode = dio
board_build.partitions = huge_app.csv

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -I include
    -DLV_CONF_INCLUDE_SIMPLE

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12
    lvgl/lvgl @ ~8.3.0
